<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; margin: 0;}
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1350px; margin: auto; padding-bottom: 20px;}
        .live-badge { background: #10b981; color: white; padding: 8px 15px; border-radius: 30px; font-weight: bold; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);}
        .live-dot { width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .container { background: white; padding: 20px; border-radius: 8px; max-width: 1350px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle;}
        th { background: #000; color: white; }
        
        .btn { padding: 6px 10px; cursor: pointer; border: none; background: #000; color: white; border-radius: 4px; font-size: 0.9em;}
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn-blue { background: #0284c7; }
        .btn:hover { opacity: 0.8; }
        
        #loginScreen { text-align: center; margin-top: 100px; }
        #dashboard { display: none; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; background: #eee; border-radius: 5px 5px 0 0; }
        .tab.active { background: #000; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;}
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        label { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block;}
        .role-badge { background: #e2e8f0; color: #475569; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-left: 5px; }
        .size-badge { background: #00AEEF; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 1.1em; }
        .remind-badge { background: #fef08a; color: #854d0e; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; display: inline-block; margin-top: 5px;}
        .warning-badge { color: #dc3545; font-weight: bold; display: inline-block; margin-top: 5px; font-size: 0.9em; background: #ffe1e1; padding: 2px 6px; border-radius: 4px; border: 1px solid #ffb3b3;}
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Benutzer" style="width: 250px; margin-bottom:10px;"><br>
        <input type="password" id="pass" placeholder="Passwort" style="width: 250px; margin-bottom:10px;"><br>
        <button class="btn" onclick="login()">Einloggen</button>
    </div>

    <div id="dashboard">
        <div class="header">
            <h2>Dashboard</h2>
            <div class="live-badge" title="DSGVO-konform verschlüsselte Besucher">
                <div class="live-dot"></div> <span id="liveVisitorCount">0</span> Besucher Live
            </div>
        </div>

        <div class="container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('orders')">📦 Bestellungen</div>
                <div class="tab" onclick="switchTab('settings')">⚙️ Einstellungen & Shop-Start</div>
            </div>

            <div id="orders" class="tab-content active">
                <button class="btn" onclick="exportCSV()">CSV Exportieren</button>
                <input type="text" id="search" placeholder="Suche nach Name oder RE-Nr..." onkeyup="filterTable()" style="width:250px; margin-left:10px; display: inline-block;">
                
                <table>
                    <thead>
                        <tr>
                            <th>Kaufdatum</th>
                            <th>Rechnungs-ID</th>
                            <th>Kunde</th>
                            <th>Größe</th>
                            <th>Betrag</th>
                            <th>Status & Erinnerung</th>
                            <th style="min-width: 130px;">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="settings" class="tab-content">
                <h3>Shop Steuerung & Countdown</h3>
                <div class="grid">
                    <div style="grid-column: span 2; background: #fffbeb; padding: 15px; border-radius: 8px; border: 1px solid #fde68a;">
                        <label style="color: #b45309; font-size: 1.1em;">🚦 Shop Status (Ampel)</label>
                        <select id="set_status" style="font-weight: bold; font-size: 1.1em; margin-bottom: 15px;">
                            <option value="geöffnet">🟢 Geöffnet (Sofort bestellen möglich)</option>
                            <option value="bald">🟡 Startet bald (Aktiviert den Start-Countdown!)</option>
                            <option value="geschlossen">🔴 Geschlossen / Verkaufsstopp</option>
                        </select>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label style="color: #b45309;">Start-Countdown (Öffnet den Shop automatisch)</label>
                                <input type="datetime-local" id="set_opening_date">
                            </div>
                            <div>
                                <label style="color: #b45309;">End-Countdown (Schließt den Shop automatisch)</label>
                                <input type="datetime-local" id="set_closing_date">
                            </div>
                        </div>
                    </div>

                    <div style="grid-column: span 2; background: #f1f5f9; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 10px;">
                        <h4 style="margin-top: 0; color: #334155;">💬 Öffentliche Mitteilungen (Optional)</h4>
                        <p style="font-size: 0.85em; color: #64748b; margin-top: -10px;">Diese Texte werden direkt unter der Ampel auf der Startseite angezeigt.</p>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                            <div>
                                <label style="color: #10b981;">Wenn Ampel GRÜN:</label>
                                <input type="text" id="msg_open" placeholder="z.B. Hoodies sind da!">
                            </div>
                            <div>
                                <label style="color: #f59e0b;">Wenn Ampel GELB:</label>
                                <input type="text" id="msg_soon" placeholder="z.B. Mach dich bereit!">
                            </div>
                            <div>
                                <label style="color: #ef4444;">Wenn Ampel ROT:</label>
                                <input type="text" id="msg_closed" placeholder="z.B. Ausverkauft, sorry!">
                            </div>
                        </div>
                    </div>

                    <div style="grid-column: span 2; border-top: 1px solid #eee; margin-top: 10px;"></div>

                    <div><label>Dein Firmenname / Absendername</label><input type="text" id="set_name"></div>
                    <div><label>E-Mail Absender</label><input type="text" id="set_email"></div>
                    <div><label>Straße & Hausnummer</label><input type="text" id="set_street"></div>
                    <div><label>PLZ & Ort</label><input type="text" id="set_city"></div>
                    <div><label>Steuernummer (Falls keine, "Keine" eintragen)</label><input type="text" id="set_tax"></div>
                    <div><label>Zahlungsziel (Tage)</label><input type="number" id="set_days"></div>
                    
                    <div style="grid-column: span 2; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px;"></div>
                    
                    <div><label>IBAN (Generiert den GiroCode)</label><input type="text" id="set_iban"></div>
                    <div><label>PayPal E-Mail (Generiert den PP-Code)</label><input type="text" id="set_paypal"></div>
                    
                    <div style="grid-column: span 2; background: #e0f2fe; padding: 15px; border-radius: 8px;">
                        <label style="color: #0369a1;">📞 Support-Telefonnummer (Öffentlich)</label>
                        <input type="text" id="set_phone" placeholder="z.B. +49 151 12345678">
                    </div>
                </div>
                <button class="btn btn-green" onclick="saveSettings()" style="padding: 15px 25px; font-size: 1.1em;">Einstellungen speichern</button>
            </div>
        </div>
    </div>

    <script>
        let authHeader = '';

        async function login() {
            authHeader = 'Basic ' + btoa(document.getElementById('user').value + ':' + document.getElementById('pass').value);
            const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
            if(res.ok) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderTable(await res.json());
                loadSettings(); 
                startLiveCounter(); 
            } else { alert('Falsche Zugangsdaten!'); }
        }

        function startLiveCounter() {
            updateLiveCounter();
            setInterval(updateLiveCounter, 10000);
        }
        async function updateLiveCounter() {
            try {
                const res = await fetch('/api/admin/visitors', { headers: { 'Authorization': authHeader } });
                const data = await res.json();
                document.getElementById('liveVisitorCount').innerText = data.count;
            } catch(e) {}
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/settings', { headers: { 'Authorization': authHeader } });
            const s = await res.json();
            document.getElementById('set_status').value = s.shopStatus || 'geöffnet';
            document.getElementById('set_name').value = s.issuerName || '';
            document.getElementById('set_email').value = s.issuerEmail || '';
            document.getElementById('set_street').value = s.issuerStreet || '';
            document.getElementById('set_city').value = s.issuerCity || '';
            document.getElementById('set_tax').value = s.issuerTaxId || '';
            document.getElementById('set_iban').value = s.issuerIban || '';
            document.getElementById('set_paypal').value = s.issuerPayPal || '';
            document.getElementById('set_days').value = s.payDays || 14;
            document.getElementById('set_phone').value = s.supportPhone || '';
            
            document.getElementById('msg_open').value = s.msgOpen || '';
            document.getElementById('msg_soon').value = s.msgSoon || '';
            document.getElementById('msg_closed').value = s.msgClosed || '';
            
            if (s.openingDate) {
                const d = new Date(s.openingDate);
                document.getElementById('set_opening_date').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,16);
            }
            if (s.closingDate) {
                const d = new Date(s.closingDate);
                document.getElementById('set_closing_date').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,16);
            }
        }

        async function saveSettings() {
            const openVal = document.getElementById('set_opening_date').value;
            const closeVal = document.getElementById('set_closing_date').value;
            const payload = {
                shopStatus: document.getElementById('set_status').value,
                openingDate: openVal ? new Date(openVal).toISOString() : null,
                closingDate: closeVal ? new Date(closeVal).toISOString() : null,
                issuerName: document.getElementById('set_name').value,
                issuerEmail: document.getElementById('set_email').value,
                issuerStreet: document.getElementById('set_street').value,
                issuerCity: document.getElementById('set_city').value,
                issuerTaxId: document.getElementById('set_tax').value,
                issuerIban: document.getElementById('set_iban').value,
                issuerPayPal: document.getElementById('set_paypal').value,
                payDays: parseInt(document.getElementById('set_days').value),
                supportPhone: document.getElementById('set_phone').value,
                msgOpen: document.getElementById('msg_open').value,
                msgSoon: document.getElementById('msg_soon').value,
                msgClosed: document.getElementById('msg_closed').value
            };
            await fetch('/api/admin/settings', {
                method: 'POST',
                headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('Einstellungen gespeichert! Der Countdown und die Nachrichten sind online.');
        }

        function renderTable(orders) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const now = new Date();

            orders.forEach(o => {
                const orderDate = new Date(o.createdAt);
                const dateStr = orderDate.toLocaleDateString('de-DE', { timeZone: 'Europe/Berlin' });
                const timeStr = orderDate.toLocaleTimeString('de-DE', { timeZone: 'Europe/Berlin', hour: '2-digit', minute:'2-digit' });
                const singlePrice = (o.role === 'Lehrer') ? 25 : 55;
                
                const diffTime = Math.abs(now - orderDate);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                let statusHtml = `<strong>${o.status}</strong>`;
                
                if(o.status === 'offen') {
                    if (diffDays > 11) {
                        statusHtml += `<br><span class="warning-badge">⚠️ ${diffDays} Tage überfällig!</span>`;
                    }
                    if (o.reminderCount > 0) {
                        statusHtml += `<br><span class="remind-badge">${o.reminderCount}x erinnert</span>`;
                    }
                }

                let btnPay = o.status === 'offen' ? `<button class="btn btn-green" onclick="markPaid('${o._id}')" title="Bezahlt">✔</button>` : '';
                let btnRemind = o.status === 'offen' ? `<button class="btn btn-blue" onclick="remindOrder('${o._id}')" title="Erinnerung senden">🔔</button>` : '';
                let btnDel = `<button class="btn btn-red" onclick="deleteOrder('${o._id}')" title="Löschen">🗑️</button>`;

                for (const[size, qty] of Object.entries(o.items)) {
                    for (let i = 0; i < qty; i++) {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${dateStr}</strong><br><small>${timeStr} Uhr</small></td>
                                <td class="searchable"><strong style="color:#555;">${o.invoiceNumber}</strong></td>
                                <td class="searchable"><strong>${o.name}</strong> <span class="role-badge">${o.role}</span><br><small>${o.email}</small></td>
                                <td><span class="size-badge">${size}</span></td>
                                <td>${singlePrice.toFixed(2).replace('.', ',')} €</td>
                                <td>${statusHtml}</td>
                                <td><div style="display:flex; gap:5px;">${btnPay} ${btnRemind} ${btnDel}</div></td>
                            </tr>`;
                    }
                }
            });
        }

        // NEU: Logik für Zahlungsbestätigung
        async function markPaid(id) {
            if(confirm('Zahlungseingang bestätigen? Der Kunde erhält nun automatisch eine Bestätigungs-E-Mail.')) {
                const btnRes = await fetch(`/api/admin/orders/${id}/pay`, { method: 'POST', headers: { 'Authorization': authHeader } });
                if(btnRes.ok) {
                    alert('Zahlung bestätigt & E-Mail erfolgreich versendet!');
                } else {
                    alert('Es gab einen Fehler beim Senden der E-Mail.');
                }
                const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
                renderTable(await res.json());
            }
        }

        async function remindOrder(id) {
            if(confirm('Möchtest du diesem Kunden eine Zahlungserinnerung inkl. neuer PDF per Mail senden?')) {
                await fetch(`/api/admin/orders/${id}/remind`, { method: 'POST', headers: { 'Authorization': authHeader } });
                alert('Erinnerung wurde erfolgreich versendet!');
                const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
                renderTable(await res.json());
            }
        }

        async function deleteOrder(id) {
            if(confirm('ACHTUNG: Möchtest du diese gesamte Bestellung unwiderruflich löschen?')) {
                await fetch(`/api/admin/orders/${id}`, { method: 'DELETE', headers: { 'Authorization': authHeader } });
                const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
                renderTable(await res.json());
            }
        }

        async function exportCSV() {
            const res = await fetch('/api/admin/export', { headers: { 'Authorization': authHeader } });
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'hoodie_bestellliste.csv';
            a.click();
        }

        function filterTable() {
            let input = document.getElementById("search").value.toLowerCase();
            document.querySelectorAll("tbody tr").forEach(tr => {
                tr.style.display = tr.querySelector(".searchable").innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
