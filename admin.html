<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; margin: 0;}
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 1100px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #000; color: white; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; background: #000; color: white; border-radius: 4px; }
        .btn-green { background: #28a745; }
        #loginScreen { text-align: center; margin-top: 100px; }
        #dashboard { display: none; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; background: #eee; border-radius: 5px 5px 0 0; }
        .tab.active { background: #000; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;}
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        label { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block;}
        .role-badge { background: #e2e8f0; color: #475569; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Benutzer" style="width: 250px; margin-bottom:10px;"><br>
        <input type="password" id="pass" placeholder="Passwort" style="width: 250px; margin-bottom:10px;"><br>
        <button class="btn" onclick="login()">Einloggen</button>
    </div>

    <div id="dashboard" class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('orders')">📦 Bestellungen</div>
            <div class="tab" onclick="switchTab('settings')">⚙️ Rechnungseinstellungen</div>
        </div>

        <div id="orders" class="tab-content active">
            <button class="btn" onclick="exportCSV()">CSV Exportieren</button>
            <input type="text" id="search" placeholder="Suche..." onkeyup="filterTable()" style="width:250px; margin-left:10px; display: inline-block;">
            
            <table>
                <thead><tr><th>RE-Nr. & Datum</th><th>Kunde</th><th>Produkte</th><th>Betrag</th><th>Status</th><th>Aktion</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="settings" class="tab-content">
            <h3>Daten für die automatische PDF-Rechnung</h3>
            <div class="grid">
                <div><label>Dein Firmenname / Absendername</label><input type="text" id="set_name"></div>
                <div><label>E-Mail Absender</label><input type="text" id="set_email"></div>
                <div><label>Straße & Hausnummer</label><input type="text" id="set_street"></div>
                <div><label>PLZ & Ort</label><input type="text" id="set_city"></div>
                <div><label>Steuernummer (Falls keine, "Keine" eintragen)</label><input type="text" id="set_tax"></div>
                <div><label>Zahlungsziel (Tage)</label><input type="number" id="set_days"></div>
                <div style="grid-column: span 2; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px;"></div>
                <div><label>IBAN (Generiert den GiroCode)</label><input type="text" id="set_iban"></div>
                <div><label>PayPal E-Mail (Generiert den PP-Code)</label><input type="text" id="set_paypal"></div>
            </div>
            <button class="btn btn-green" onclick="saveSettings()">Einstellungen speichern</button>
        </div>
    </div>

    <script>
        let authHeader = '';

        async function login() {
            authHeader = 'Basic ' + btoa(document.getElementById('user').value + ':' + document.getElementById('pass').value);
            const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
            
            if(res.ok) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderTable(await res.json());
                loadSettings(); 
            } else { alert('Falsche Zugangsdaten!'); }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/settings', { headers: { 'Authorization': authHeader } });
            const s = await res.json();
            document.getElementById('set_name').value = s.issuerName || '';
            document.getElementById('set_email').value = s.issuerEmail || '';
            document.getElementById('set_street').value = s.issuerStreet || '';
            document.getElementById('set_city').value = s.issuerCity || '';
            document.getElementById('set_tax').value = s.issuerTaxId || '';
            document.getElementById('set_iban').value = s.issuerIban || '';
            document.getElementById('set_paypal').value = s.issuerPayPal || '';
            document.getElementById('set_days').value = s.payDays || 14;
        }

        async function saveSettings() {
            const payload = {
                issuerName: document.getElementById('set_name').value,
                issuerEmail: document.getElementById('set_email').value,
                issuerStreet: document.getElementById('set_street').value,
                issuerCity: document.getElementById('set_city').value,
                issuerTaxId: document.getElementById('set_tax').value,
                issuerIban: document.getElementById('set_iban').value,
                issuerPayPal: document.getElementById('set_paypal').value,
                payDays: parseInt(document.getElementById('set_days').value)
            };
            await fetch('/api/admin/settings', {
                method: 'POST',
                headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('Rechnungseinstellungen gespeichert!');
        }

        function renderTable(orders) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            orders.forEach(o => {
                const date = new Date(o.createdAt).toLocaleDateString('de-DE');
                let itemsStr = Object.entries(o.items).filter(i => i[1]>0).map(i => `${i[1]}x Gr. ${i[0]}`).join('<br>');
                let btn = o.status === 'offen' ? `<button class="btn btn-green" onclick="markPaid('${o._id}')">✔ Bezahlt</button>` : 'Bezahlt';

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${o.invoiceNumber}</strong><br><small>${date}</small></td>
                        <td class="searchable"><strong>${o.name}</strong> <span class="role-badge">${o.role}</span><br>${o.email}</td>
                        <td>${itemsStr}</td>
                        <td>${o.totalPrice.toFixed(2).replace('.', ',')} €</td>
                        <td><strong>${o.status}</strong></td>
                        <td>${btn}</td>
                    </tr>`;
            });
        }

        async function markPaid(id) {
            if(confirm('Zahlungseingang bestätigt?')) {
                await fetch(`/api/admin/orders/${id}/pay`, { method: 'POST', headers: { 'Authorization': authHeader } });
                const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
                renderTable(await res.json());
            }
        }

        async function exportCSV() {
            const res = await fetch('/api/admin/export', { headers: { 'Authorization': authHeader } });
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'bestellungen.csv';
            a.click();
        }

        function filterTable() {
            let input = document.getElementById("search").value.toLowerCase();
            document.querySelectorAll("tbody tr").forEach(tr => {
                tr.style.display = tr.querySelector(".searchable").innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
