<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #000; color: white; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; background: #000; color: white; border-radius: 4px; }
        .btn-green { background: #28a745; }
        #loginScreen { text-align: center; margin-top: 100px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Benutzername" style="padding:10px; margin-bottom:10px;"><br>
        <input type="password" id="pass" placeholder="Passwort" style="padding:10px; margin-bottom:10px;"><br>
        <button class="btn" onclick="login()">Einloggen</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container">
        <h1>Hoodie Bestellungen</h1>
        <button class="btn" onclick="exportCSV()">CSV Exportieren</button>
        <input type="text" id="search" placeholder="Suche nach Name..." onkeyup="filterTable()" style="padding:8px; width:250px; margin-left:10px;">
        
        <table>
            <thead><tr><th>Datum</th><th>Kunde</th><th>Produkte</th><th>Betrag</th><th>Status</th><th>Aktion</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let authHeader = '';

        async function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            authHeader = 'Basic ' + btoa(user + ':' + pass);
            
            const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
            
            if(res.ok) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderTable(await res.json());
            } else {
                alert('Falsche Zugangsdaten!');
            }
        }

        function renderTable(orders) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            orders.forEach(o => {
                const date = new Date(o.createdAt).toLocaleString('de-DE');
                let itemsStr = Object.entries(o.items).filter(i => i[1]>0).map(i => `${i[1]}x Gr. ${i[0]}`).join(', ');
                let btn = o.status === 'offen' ? `<button class="btn btn-green" onclick="markPaid('${o._id}')">✔ Bezahlt</button>` : 'Bezahlt';

                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td class="searchable"><strong>${o.name}</strong><br>${o.email}<br><small>${o.address}</small></td>
                        <td>${itemsStr}</td>
                        <td>${o.totalPrice.toFixed(2)} €</td>
                        <td><strong>${o.status}</strong></td>
                        <td>${btn}</td>
                    </tr>`;
            });
        }

        async function markPaid(id) {
            if(confirm('Zahlungseingang bestätigt?')) {
                await fetch(`/api/admin/orders/${id}/pay`, { method: 'POST', headers: { 'Authorization': authHeader } });
                const res = await fetch('/api/admin/orders', { headers: { 'Authorization': authHeader } });
                renderTable(await res.json());
            }
        }

        async function exportCSV() {
            const res = await fetch('/api/admin/export', { headers: { 'Authorization': authHeader } });
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bestellungen.csv';
            a.click();
        }

        function filterTable() {
            let input = document.getElementById("search").value.toLowerCase();
            document.querySelectorAll("tbody tr").forEach(tr => {
                tr.style.display = tr.querySelector(".searchable").innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
